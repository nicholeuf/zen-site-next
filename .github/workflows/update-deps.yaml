name: Manual Update pnpm Dependencies and Snapshots
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:

jobs:
  update-dep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        name: Install pnpm
     
      - name: Use Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Update dependencies (restore @types/node)
        run: bash scripts/update_dependencies.sh

      - name: Restore cache
        id: nextjs-cache-vitest
        uses: actions/cache@v5
        with:
          # Next.js build cache only. pnpm cache is handled by setup-node above.
          path: |
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          # Key structure: OS + lockfile hash + source hash.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Record pnpm cache status
        if: ${{ always() }}
        run: |
          bash scripts/gen-ci-cache-status.sh \
            "pnpm" \
            "${{ steps.setup-node.outputs.cache-hit }}" \
            "${{ github.run_id }}" \
            "${{ github.run_attempt }}" \
            "${{ github.workflow }}" \
            "${{ github.job }}" \
            "${{ github.ref }}" \
            "${{ github.sha }}" \
            "artifacts/ci-cache-status-pnpm.json"

      - name: Record nextjs cache status
        if: ${{ always() }}
        run: |
          bash scripts/gen-ci-cache-status.sh \
            "nextjs" \
            "${{ steps.nextjs-cache-vitest.outputs.cache-hit }}" \
            "${{ github.run_id }}" \
            "${{ github.run_attempt }}" \
            "${{ github.workflow }}" \
            "${{ github.job }}" \
            "${{ github.ref }}" \
            "${{ github.sha }}" \
            "artifacts/ci-cache-status-nextjs.json"

      - name: Upload cache status artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-cache-status
          path: artifacts/
          if-no-files-found: warn
      
      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium

      - name: Run Vitest to update snapshots
        run: pnpm run test:update
        env:
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GOOGLE_AUTHENTICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_AUTHENTICATION }}
          NEXT_PUBLIC_SMALLCHAT_ENABLED: ${{ secrets.NEXT_PUBLIC_SMALLCHAT_ENABLED }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT }}
          commit-message: Update dependencies and snapshots
          title: Update dependencies
          body: |
            - Updated pnpm dependencies to latest
            - Updated Vitest snapshots

            Auto-generated by create-pull-request
          branch: update-dependencies
          draft: true
