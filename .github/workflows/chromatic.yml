name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chromatic:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Use Node.js
          id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Restore cache
          id: nextjs-cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

        - name: Record cache status
          if: ${{ always() }}
          run: |
            bash scripts/gen-ci-cache-status.sh \
              "${{ steps.setup-node.outputs.cache-hit || 'unknown' }}" \
              "${{ steps.nextjs-cache.outputs.cache-hit || 'false' }}" \
              "${{ github.run_id }}" \
              "${{ github.run_attempt }}" \
              "${{ github.workflow }}" \
              "${{ github.job }}" \
              "${{ github.ref }}" \
              "${{ github.sha }}" \
              "artifacts/ci-cache-status.json"

        - name: Upload cache status artifact
          if: ${{ always() }}
          uses: actions/upload-artifact@v4
          with:
            name: ci-cache-status
            path: artifacts/ci-cache-status.json
            if-no-files-found: error

      - name: Publish to Chromatic
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        env:
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
